<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>QCM – Vocabulaire Leçons 1 à 10</title>
  <style>
    :root { --rose:#c2697c; --deep:#7a3347; --pale:#f8ecef; --gold:#c9a84c; --dark:#1e1318; --mid:#6b5460; --border:#eddde3; }
    * { box-sizing:border-box; margin:0; padding:0; }
    body { font-family:'Segoe UI',Arial,sans-serif; background:#f5eff2; min-height:100vh; display:flex; flex-direction:column; align-items:center; padding:20px 16px 32px; color:var(--dark); }
    .top-strip { width:100%; max-width:600px; height:4px; background:linear-gradient(90deg,var(--deep),var(--rose),var(--gold)); border-radius:2px; margin-bottom:14px; }
    header { background:linear-gradient(135deg,var(--deep) 0%,#a04560 100%); color:white; width:100%; max-width:600px; border-radius:14px; padding:16px 24px; text-align:center; margin-bottom:16px; position:relative; overflow:hidden; box-shadow:0 4px 18px rgba(122,51,71,.25); }
    header::before { content:'البداية'; font-size:6rem; font-weight:700; color:rgba(255,255,255,.06); position:absolute; right:-1rem; top:-1.5rem; line-height:1; pointer-events:none; font-family:Arial,sans-serif; direction:rtl; }
    header .ar { font-size:1.1rem; font-weight:700; letter-spacing:.12em; text-transform:uppercase; margin-bottom:4px; position:relative; opacity:.95; }
    header h1 { font-size:.9rem; font-weight:600; opacity:.9; position:relative; }
    .progress-bar { width:100%; max-width:600px; height:8px; background:var(--border); border-radius:4px; margin-bottom:14px; overflow:hidden; }
    .progress-fill { height:100%; background:linear-gradient(90deg,var(--rose),var(--gold)); border-radius:4px; transition:width .4s ease; }
    .counter { font-size:.82rem; color:var(--mid); margin-bottom:18px; font-weight:600; }
    .question-card { background:white; border:1.5px solid var(--border); border-radius:16px; padding:32px 24px; text-align:center; width:100%; max-width:600px; margin-bottom:20px; box-shadow:0 2px 12px rgba(194,105,124,.1); }
    .question-label { font-size:.72rem; text-transform:uppercase; letter-spacing:.08em; color:var(--mid); margin-bottom:12px; }
    .arabic-word { font-size:3.5rem; direction:rtl; font-family:Arial,'Geeza Pro',serif; color:var(--deep); line-height:1.3; }
    .choices { display:grid; grid-template-columns:1fr 1fr; gap:10px; width:100%; max-width:600px; }
    .choice { background:white; border:2px solid var(--border); border-radius:12px; padding:14px 16px; cursor:pointer; text-align:center; font-size:.95rem; font-weight:600; color:var(--dark); transition:all .15s; box-shadow:0 1px 4px rgba(194,105,124,.07); }
    .choice:hover:not(.locked) { border-color:var(--rose); box-shadow:0 3px 10px rgba(194,105,124,.2); }
    .choice.correct { background:#fdf5e0; border-color:var(--gold); color:#7a600a; }
    .choice.wrong { background:#fce8ec; border-color:#e53935; color:#b71c1c; animation:shake .3s ease; }
    .choice.locked { cursor:default; }
    @keyframes shake { 0%,100%{transform:translateX(0)} 25%{transform:translateX(-6px)} 75%{transform:translateX(6px)} }
    .score-pill { background:white; border:1.5px solid var(--border); border-radius:20px; padding:6px 20px; font-weight:700; color:var(--deep); font-size:.85rem; margin-top:16px; }

    /* célébration */
    .celebration { display:none; position:fixed; inset:0; background:rgba(122,51,71,.92); z-index:999; flex-direction:column; align-items:center; justify-content:center; text-align:center; padding:24px; }
    .celebration.visible { display:flex; }
    .lollipop { font-size:11rem; animation:popIn .6s cubic-bezier(.175,.885,.32,1.275) forwards, wobble 1.2s ease-in-out .6s infinite; margin-bottom:14px; }
    @keyframes popIn { 0%{transform:scale(0) rotate(-20deg);opacity:0} 100%{transform:scale(1) rotate(0);opacity:1} }
    @keyframes wobble { 0%,100%{transform:rotate(-6deg) scale(1)} 50%{transform:rotate(6deg) scale(1.05)} }
    .mashallah { font-size:3rem; font-family:Arial,'Geeza Pro',serif; direction:rtl; color:#f9d97a; font-weight:700; text-shadow:0 2px 12px rgba(0,0,0,.4); animation:fadeUp .5s ease .4s both; margin-bottom:10px; }
    .praise { font-size:1.4rem; font-family:Arial,'Geeza Pro',serif; direction:rtl; color:white; animation:fadeUp .5s ease .6s both; margin-bottom:6px; }
    .praise-fr { font-size:.95rem; color:rgba(255,255,255,.8); animation:fadeUp .5s ease .75s both; margin-bottom:24px; }
    .stars-row { font-size:1.8rem; letter-spacing:8px; animation:fadeUp .5s ease .9s both; margin-bottom:24px; }
    @keyframes fadeUp { 0%{opacity:0;transform:translateY(20px)} 100%{opacity:1;transform:translateY(0)} }
    .btn-restart { background:#f9d97a; color:var(--deep); border:none; border-radius:12px; padding:13px 32px; font-size:.95rem; font-weight:700; cursor:pointer; font-family:'Segoe UI',Arial,sans-serif; animation:fadeUp .5s ease 1s both; transition:background .15s,transform .1s; box-shadow:0 4px 16px rgba(0,0,0,.25); }
    .btn-restart:hover { background:white; transform:scale(1.04); }
    button.main { background:var(--rose); color:white; border:none; border-radius:10px; padding:9px 26px; font-size:.85rem; cursor:pointer; font-weight:600; transition:background .15s; font-family:'Segoe UI',Arial,sans-serif; box-shadow:0 2px 8px rgba(194,105,124,.3); margin-top:14px; }
    button.main:hover { background:var(--deep); }
  </style>
</head>
<body>
  <div class="top-strip"></div>
  <header>
    <div class="ar">BIDAYAH &mdash; Exercices vocabulaire</div>
    <h1>✨ QCM · Vocabulaire – Leçons 1 à 10</h1>
  </header>
  <div class="progress-bar"><div class="progress-fill" id="prog"></div></div>
  <div class="counter" id="counter">Question 1 / 10</div>
  <div class="question-card">
    <div class="question-label">Quelle est la traduction de ce mot ?</div>
    <div class="arabic-word" id="arabic-word">—</div>
  </div>
  <div class="choices" id="choices"></div>
  <div class="score-pill">★ <span id="score">0</span> bonne(s) réponse(s)</div>
  <button class="main" onclick="init()">🔄 Recommencer</button>

  <div class="celebration" id="celebration">
    <div class="lollipop">🍭</div>
    <div class="mashallah">مَا شَاءَ اللهُ</div>
    <div class="praise">أَحْسَنْتِ ! بَارَكَ اللهُ فِيكِ</div>
    <div class="praise-fr">Bravo ! Tu as tout réussi !</div>
    <div class="stars-row">🌸 ⭐ 🌸 ⭐ 🌸</div>
    <button class="btn-restart" onclick="closeRestart()">🔄 Recommencer</button>
  </div>

<script>
  const PAIRS = [
    {ar:'بَابٌ',fr:'porte'},{ar:'تُوتٌ',fr:'mûre'},{ar:'دُودٌ',fr:'ver'},
    {ar:'دَارٌ',fr:'maison'},{ar:'كِتَابٌ',fr:'livre'},{ar:'سَرِيرٌ',fr:'lit'},
    {ar:'لِبَاسٌ',fr:'vêtement'},{ar:'جَبَلٌ',fr:'montagne'},{ar:'مَسْجِدٌ',fr:'mosquée'},{ar:'حَاسِبَةٌ',fr:'calculatrice'}
  ];
  let queue, idx, score;

  function shuffle(a){const b=[...a];for(let i=b.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[b[i],b[j]]=[b[j],b[i]]}return b;}

  function init(){
    queue=shuffle(PAIRS); idx=0; score=0;
    document.getElementById('score').textContent='0';
    document.getElementById('celebration').classList.remove('visible');
    showQuestion();
  }

  function showQuestion(){
    const q=queue[idx];
    document.getElementById('counter').textContent=`Question ${idx+1} / 10`;
    document.getElementById('prog').style.width=`${idx*10}%`;
    document.getElementById('arabic-word').textContent=q.ar;
    const wrongs=shuffle(PAIRS.filter(p=>p.fr!==q.fr)).slice(0,3);
    const opts=shuffle([q,...wrongs]);
    const box=document.getElementById('choices');
    box.innerHTML='';
    opts.forEach(o=>{
      const btn=document.createElement('button');
      btn.className='choice'; btn.textContent=o.fr;
      btn.addEventListener('click',()=>answer(btn,o.fr===q.fr));
      box.appendChild(btn);
    });
  }

  function answer(btn,correct){
    document.querySelectorAll('.choice').forEach(b=>b.classList.add('locked'));
    if(correct){btn.classList.add('correct');score++;document.getElementById('score').textContent=score;}
    else btn.classList.add('wrong');
    setTimeout(()=>{
      idx++;
      if(idx>=PAIRS.length){
        document.getElementById('prog').style.width='100%';
        setTimeout(()=>document.getElementById('celebration').classList.add('visible'),300);
      } else showQuestion();
    },900);
  }

  function closeRestart(){document.getElementById('celebration').classList.remove('visible');init();}
  init();
</script>
</body>
</html>
