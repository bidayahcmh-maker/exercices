<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Al Bidayah — Sana</title>
  <style>
    :root{--rose:#c2697c;--deep:#7a3347;--pale:#f8ecef;--gold:#c9a84c;--dark:#1e1318;--mid:#6b5460;--border:#eddde3;}
    *{box-sizing:border-box;margin:0;padding:0;}
    body{font-family:'Segoe UI',Arial,sans-serif;background:#f5eff2;min-height:100vh;display:flex;flex-direction:column;align-items:center;padding:24px 16px 48px;color:var(--dark);}
    .top-strip{width:100%;max-width:600px;height:4px;background:linear-gradient(90deg,var(--deep),var(--rose),var(--gold));border-radius:2px;margin-bottom:16px;}
    header{background:linear-gradient(135deg,var(--deep) 0%,#a04560 100%);color:white;width:100%;max-width:600px;border-radius:16px;padding:22px 24px 16px;text-align:center;margin-bottom:28px;position:relative;overflow:hidden;box-shadow:0 6px 24px rgba(122,51,71,.3);}
    header::before{content:'البداية';font-size:7rem;font-weight:700;color:rgba(255,255,255,.06);position:absolute;right:-1rem;top:-1.5rem;line-height:1;pointer-events:none;font-family:Arial,sans-serif;direction:rtl;}
    .logo-ar{font-size:2rem;direction:rtl;font-family:Arial,'Geeza Pro',serif;margin-bottom:6px;position:relative;}
    header h1{font-size:.95rem;font-weight:600;opacity:.85;position:relative;margin-bottom:4px;}
    header p{font-size:.78rem;opacity:.65;position:relative;}
    .eleve-chip{display:inline-flex;align-items:center;gap:6px;background:rgba(255,255,255,.18);border:1px solid rgba(255,255,255,.3);border-radius:20px;padding:4px 14px;font-size:.78rem;margin-top:8px;position:relative;}
    .subtitle{font-size:.78rem;color:var(--mid);font-weight:600;text-transform:uppercase;letter-spacing:.08em;margin-bottom:14px;width:100%;max-width:600px;}
    .cards{display:flex;flex-direction:column;gap:12px;width:100%;max-width:600px;}
    .cours-card{background:white;border:1.5px solid var(--border);border-radius:14px;padding:20px 20px;text-decoration:none;color:var(--dark);display:flex;align-items:center;gap:16px;box-shadow:0 2px 10px rgba(194,105,124,.08);transition:all .18s;}
    .cours-card:hover{border-color:var(--rose);box-shadow:0 6px 20px rgba(194,105,124,.2);transform:translateY(-2px);}
    .cours-card.gold{border-color:var(--gold);background:linear-gradient(135deg,#fffdf5,#fff8e6);}
    .cours-icon{font-size:2.4rem;flex-shrink:0;}
    .cours-body{flex:1;}
    .cours-ar{font-family:Arial,'Geeza Pro',serif;direction:rtl;font-size:1.2rem;font-weight:700;color:var(--deep);margin-bottom:3px;}
    .cours-title{font-size:.88rem;font-weight:700;color:var(--deep);margin-bottom:4px;}
    .cours-desc{font-size:.75rem;color:var(--mid);line-height:1.45;}
    .tag{display:inline-block;background:var(--pale);color:var(--rose);font-size:.66rem;font-weight:700;padding:3px 10px;border-radius:20px;border:1px solid var(--border);margin-top:5px;}
    .tag-gold{background:#fdf3dc;color:#7a600a;border-color:var(--gold);}
    .arrow{color:var(--rose);font-size:1.3rem;flex-shrink:0;}
  </style>
</head>
<body>
  <div class="top-strip"></div>
  <header>
    <div class="logo-ar">البِدَايَةُ</div>
    <h1>Cours particuliers d'arabe</h1>
    <p>Espace élève</p>
    <div class="eleve-chip">👩 Sana</div>
  </header>

  <div class="subtitle">Mes cours</div>

  <div class="cards">
    <a class="cours-card gold" href="cours-fi-madrassati-sana.html">
      <div class="cours-icon">📚</div>
      <div class="cours-body">
        <div class="cours-ar">فِي الْمَدْرَسَةِ</div>
        <div class="cours-title">À l'école — Cours complet</div>
        <div class="cours-desc">Lecture du texte · Vocabulaire · Grammaire (passé, masc/fém, singulier/pluriel) · Exercices interactifs · Dictée</div>
        <span class="tag tag-gold">⏱ 1 heure · Niveau 1</span>
      </div>
      <div class="arrow">→</div>
    </a>
  </div>
</body>
</html>
